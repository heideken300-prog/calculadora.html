<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Soluciones</title>

<link rel="apple-touch-icon" href="icono.png">

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#2E86C1,#1B4F72);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:25px;
border-radius:15px;
width:320px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
color:#1B4F72;
}

input,select{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:48%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:15px;
cursor:pointer;
}

.calcular{
background:#27AE60;
color:white;
}

.limpiar{
background:#E74C3C;
color:white;
}

.result{
background:#F2F3F4;
padding:10px;
margin-top:10px;
border-radius:8px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Calculadora de Soluciones</h2>

<select id="unidad">
<option>kg</option>
<option>litros</option>
</select>

<input id="kg" placeholder="Cantidad de químico">
<input id="pureza" placeholder="Pureza (%)">
<input id="target" placeholder="Concentración objetivo (%)">
<input id="condensados" placeholder="Condensados (%)">

<div>
<button class="calcular" onclick="calcular()">Calcular</button>
<button class="limpiar" onclick="limpiar()">Limpiar</button>
</div>

<div class="result" id="resultado1"></div>
<div class="result" id="resultado2"></div>

</div>

<script>

function calcular(){

let kg=parseFloat(document.getElementById("kg").value)
let pureza=parseFloat(document.getElementById("pureza").value)
let target=parseFloat(document.getElementById("target").value)
let condensados=parseFloat(document.getElementById("condensados").value)

let quimicoPuro = kg*(pureza/100)

let solucionTotal = quimicoPuro/(target/100)

let aguaFinal = solucionTotal-kg

let condGenerados = solucionTotal*(condensados/100)

let aguaInicial = aguaFinal-condGenerados

document.getElementById("resultado1").innerHTML="Solución total: "+solucionTotal.toFixed(2)

document.getElementById("resultado2").innerHTML="Agua inicial: "+aguaInicial.toFixed(2)

}

function limpiar(){

document.getElementById("kg").value=""
document.getElementById("pureza").value=""
document.getElementById("target").value=""
document.getElementById("condensados").value=""

document.getElementById("resultado1").innerHTML=""
document.getElementById("resultado2").innerHTML=""

}

</script>

</body>
</html>
